name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 用 Gradle 官方 wrapper 脚本生成正确的 gradlew + jar
      #    （避免本地预置的 jar 文件损坏或不兼容）
      - name: Generate Gradle Wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle-8.2.zip
          unzip -q /tmp/gradle-8.2.zip -d /tmp/
          # 使用完整版 Gradle 的 wrapper 命令重新生成
          /tmp/gradle-8.2/bin/gradle wrapper --gradle-version 8.2 --distribution-type bin
          chmod +x ./gradlew
          echo "Gradle wrapper generated:"
          ls -la gradlew gradle/wrapper/

      # 4. 缓存 Gradle 依赖
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. 恢复固定 Debug 签名（可选）
      #    将本机 ~/.android/debug.keystore base64 后写入
      #    GitHub Secrets: ANDROID_DEBUG_KEYSTORE_BASE64
      #    这样本机 debug 包和 Actions debug 包可互相覆盖安装。
      - name: Restore fixed debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "No fixed debug keystore configured; using runner-generated debug keystore."
            exit 0
          fi
          mkdir -p ~/.android
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore
          chmod 600 ~/.android/debug.keystore

      # 6. 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. 上传 Artifact（保留 7 天）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pickcode-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # 8. 打印 APK 信息
      - name: Show APK info
        run: |
          echo "=== Build outputs ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
